apiVersion: v1
kind: Namespace
metadata:
  name: homelab-dns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-coredns
  namespace: homelab-dns
data:
  Corefile: |
    steventidd.com:53 {
        errors
        log
        template IN A {
            match ^(.+\.)?steventidd\.com\.$
            answer "{{ .Name }} 60 IN A 192.168.4.60"
            fallthrough
        }
    }

    .:53 {
        errors
        log
        health
        ready
        forward . 1.1.1.1 9.9.9.9
        cache 30
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-coredns
  namespace: homelab-dns
  labels:
    app.kubernetes.io/name: homelab-coredns
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-coredns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-coredns
    spec:
      containers:
        - name: coredns
          image: coredns/coredns:1.13.1
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: metrics
              containerPort: 9153
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: homelab-coredns
---
apiVersion: v1
kind: Service
metadata:
  name: homelab-coredns
  namespace: homelab-dns
  labels:
    app.kubernetes.io/name: homelab-coredns
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.4.61
  selector:
    app.kubernetes.io/name: homelab-coredns
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
