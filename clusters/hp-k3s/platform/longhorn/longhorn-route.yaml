apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - longhorn.steventidd.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: longhorn-frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-http-redirect
  namespace: longhorn-system
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-ingress
      sectionName: http
  hostnames:
    - longhorn.steventidd.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
