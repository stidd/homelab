apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-http-redirect
  namespace: whoami
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-ingress
      sectionName: http
  hostnames:
    - whoami.steventidd.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
