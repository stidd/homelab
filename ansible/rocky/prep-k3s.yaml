# prep-k3s.yml
- name: Prepare Rocky Linux nodes for K3s
  hosts: k3s_servers
  become: true
  tasks:
    - name: Update packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install useful packages
      ansible.builtin.dnf:
        name:
          - curl
          - vim
          - git
          - iproute
          - iptables
          - nfs-utils
        state: present

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          br_netfilter
          overlay

    - name: Apply kernel modules now
      ansible.builtin.shell: |
        modprobe br_netfilter
        modprobe overlay
      changed_when: false

    - name: Set Kubernetes sysctls
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-k3s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctls
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Open K3s firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - 6443/tcp
        - 9345/tcp
        - 2379-2380/tcp
        - 8472/udp
        - 10250/tcp